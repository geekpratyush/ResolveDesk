<div class="login-wrapper animate-fade-in">
  <div class="login-card">
    <div class="logo-area">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-svg">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <path d="M9 15l2 2 4-4"></path>
      </svg>
      <span class="brand-name">ResolveDesk</span>
    </div>
    
    <p class="subtitle">Enterprise Ticketing Management</p>

    <div *ngIf="errorMessage" class="error-banner">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" name="email" [(ngModel)]="email" placeholder="e.g. customer@resolvedesk.com" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" [(ngModel)]="password" placeholder="••••••••" required>
      </div>

      <button class="btn btn-primary w-full" type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <div class="divider">
      <span>Or continue with</span>
    </div>

    <div class="oauth-buttons">
      <button class="btn btn-secondary oauth-btn" (click)="loginWithGoogle()" [disabled]="isLoading">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
        Google
      </button>

      <button class="btn btn-secondary oauth-btn" (click)="loginWithGitHub()" [disabled]="isLoading">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M12 1.27a11 11 0 00-3.48 21.46c.55.09.73-.24.73-.53v-1.84c-3.03.66-3.67-1.46-3.67-1.46-.5-1.27-1.2-1.61-1.2-1.61-.99-.68.08-.66.08-.66 1.1.08 1.68 1.13 1.68 1.13.97 1.66 2.54 1.18 3.16.9.1-.7.38-1.18.69-1.45-2.42-.28-4.97-1.21-4.97-5.4 0-1.2.43-2.18 1.13-2.95-.11-.28-.49-1.4.11-2.9 0 0 .92-.3 3.03 1.13a10.5 10.5 0 015.5 0c2.1-1.43 3.02-1.13 3.02-1.13.6 1.5.22 2.62.11 2.9.7.77 1.13 1.75 1.13 2.95 0 4.2-2.56 5.11-5 5.39.4.34.75 1.02.75 2.06v3.07c0 .3.18.63.74.52A11 11 0 0012 1.27z"/>
        </svg>
        GitHub
      </button>
    </div>

    <div class="footer-text">
      Don't have an account? <a routerLink="/register">Register here</a>
    </div>

    <div class="demo-accounts">
      <p class="demo-title">Demo Accounts (Password: Admin&#64;123, Support&#64;123, Customer&#64;123)</p>
      <ul>
        <li><strong>Admin:</strong> admin&#64;resolvedesk.com</li>
        <li><strong>Agent:</strong> support&#64;resolvedesk.com</li>
        <li><strong>Customer:</strong> customer&#64;resolvedesk.com</li>
      </ul>
    </div>
  </div>
</div>
